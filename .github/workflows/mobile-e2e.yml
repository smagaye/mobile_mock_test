name: E2E Tests

# ─────────────────────────────────────────────
# Déclenché sur push main et toutes les PR
# ─────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45      # évite les runs bloqués indéfiniment

    steps:

      # ── 1. Checkout ─────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java (requis par Android SDK) ────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Flutter ──────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true                  # cache Flutter entre les runs

      # ── 4. Cache AVD (system image ~1.5 Go) ─
      # Évite de retélécharger l'image Android à chaque run
      - name: Cache Android AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
          key: avd-api33-${{ runner.os }}-x86_64-v1

      # ── 5. Cache Maestro ────────────────────
      - name: Cache Maestro
        uses: actions/cache@v4
        id: maestro-cache
        with:
          path: ~/.maestro
          key: maestro-1.40.0

      # ── 6. Installer Maestro ────────────────
      - name: Install Maestro
        run: |
          if ! command -v maestro &> /dev/null; then
            export MAESTRO_VERSION=1.40.0
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── 7. Flutter dependencies ─────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 8. Build APK debug ──────────────────
      - name: Build APK
        run: flutter build apk --debug

      # ── 9. Vérifier que l'APK existe ────────
      - name: Check APK exists
        run: |
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          echo "APK OK ✓"

      # ── 10. Émulateur + Tests ───────────────
      - name: Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          avd-name: Pixel_6_API33
          force-avd-creation: false
          cores: 2
          ram-size: 4096M
          heap-size: 512M
          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
            -no-snapshot-save
          disable-animations: true

          script: |
            set -e

            echo "════════════════════════════════"
            echo "  Attente du boot émulateur"
            echo "════════════════════════════════"

            adb wait-for-device

            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" = "1" ]; do
              echo "  Boot en cours..."
              sleep 3
            done

            until [ "$(adb shell getprop init.svc.bootanim 2>/dev/null)" = "stopped" ]; do
              echo "  Animations en cours..."
              sleep 2
            done

            echo "Boot complet ✓"

            # Désactiver animations — fix screenshot error -1
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            # Laisser le GPU renderer s'initialiser
            sleep 10

            echo "════════════════════════════════"
            echo "  Installation de l'APK"
            echo "════════════════════════════════"

            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            echo "APK installé ✓"

            adb shell monkey \
              -p com.example.account_manager \
              --pct-syskeys 0 1
            sleep 5

            echo "════════════════════════════════"
            echo "  Vérification Maestro"
            echo "════════════════════════════════"
            ~/.maestro/bin/maestro hierarchy

            echo "════════════════════════════════"
            echo "  Lancement des tests"
            echo "════════════════════════════════"

            mkdir -p results/videos results/screenshots

            # Vidéo flow complet
            ~/.maestro/bin/maestro record --local \
              --output results/videos/full_flow.mp4 \
              maestro/flows/06_full_flow.yaml \
              -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
              -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}"

            # Tous les tests + rapport HTML
            ~/.maestro/bin/maestro test maestro/flows/ \
              -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
              -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}" \
              --format html \
              --output results/rapport.html \
              --test-output-dir results/screenshots

            echo "Tests terminés ✓"

      # ── 11. Upload artefacts ────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_number }}
          path: results/
          retention-days: 14
