name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────
# Global variables — edit here, not in steps
# ─────────────────────────────────────────────
env:
  # Flutter
  FLUTTER_VERSION: '3.19.0'

  # Maestro
  MAESTRO_VERSION: '2.5.1'
  MAESTRO: maestro

  # Android emulator
  ANDROID_API_LEVEL: '33'
  ANDROID_ARCH: 'x86_64'
  ANDROID_TARGET: 'google_apis'
  ANDROID_PROFILE: 'pixel_6'
  ANDROID_AVD_NAME: 'Pixel_6_API33'
  ANDROID_RAM: '4096M'
  ANDROID_HEAP: '512M'
  ANDROID_CORES: '2'

  # App
  APP_PACKAGE: 'com.example.account_manager'
  APK_PATH: 'build/app/outputs/flutter-apk/app-debug.apk'

  # Paths
  FLOWS_DIR: 'maestro/flows'
  RESULTS_DIR: 'results'
  VIDEOS_DIR: 'results/videos'
  SCREENSHOTS_DIR: 'results/screenshots'
  REPORT_FILE: 'results/report.html'
  SCRIPT_PATH: 'scripts/run_e2e.sh'

  # Artifact retention (days)
  ARTIFACT_RETENTION: '14'

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ── 1. Checkout ─────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. KVM hardware acceleration ────────
      # Without KVM the emulator runs in software mode
      # → too slow to boot → device offline error
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 3. Java ─────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Flutter ──────────────────────────
      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── 5. Cache Android AVD (~1.5 GB) ──────
      # Avoids re-downloading the Android system image on every run
      - name: Cache Android AVD
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
          key: avd-api${{ env.ANDROID_API_LEVEL }}-${{ runner.os }}-${{ env.ANDROID_ARCH }}-v1

      # ── 6. Cache Maestro ────────────────────
      - name: Cache Maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}

      # ── 7. Install Maestro ──────────────────
      - name: Install Maestro ${{ env.MAESTRO_VERSION }}
        run: |
          MAESTRO_BIN="$HOME/.maestro/bin/maestro"
      
          # Install only if not already cached
          if [ ! -f "$MAESTRO_BIN" ]; then
            export MAESTRO_VERSION=${{ env.MAESTRO_VERSION }}
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
      
          # Always add to PATH — cache or fresh install
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      
          # Read installed version dynamically
          INSTALLED_VERSION=$($MAESTRO_BIN --version 2>&1 \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
      
          echo "Maestro installed: $INSTALLED_VERSION"
          echo "MAESTRO_INSTALLED_VERSION=$INSTALLED_VERSION" >> $GITHUB_ENV
          
      # ── 8. Flutter dependencies ─────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 9. Fix AGP for compileSdk 35 ────────
      # compileSdk 35 requires AGP 8.1.0+
      - name: Fix Android Gradle Plugin version
        run: |
          sed -i \
            "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.3.0/" \
            android/build.gradle
          sed -i \
            "s|gradle-[0-9.]*-bin.zip|gradle-8.4-bin.zip|" \
            android/gradle/wrapper/gradle-wrapper.properties

      # ── 10. Build debug APK ─────────────────
      - name: Build APK
        run: flutter build apk --debug

      # ── 11. Verify APK ──────────────────────
      - name: Verify APK
        run: |
          ls -lh ${{ env.APK_PATH }}
          echo "APK ready ✓"

      # ── 12. Run emulator + E2E tests ────────
      # Script is in an external .sh file to avoid
      # multiline parsing errors with /usr/bin/sh
      - name: Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          APP_PACKAGE: ${{ env.APP_PACKAGE }}
          APK_PATH: ${{ env.APK_PATH }}
          FLOWS_DIR: ${{ env.FLOWS_DIR }}
          RESULTS_DIR: ${{ env.RESULTS_DIR }}
          VIDEOS_DIR: ${{ env.VIDEOS_DIR }}
          SCREENSHOTS_DIR: ${{ env.SCREENSHOTS_DIR }}
          REPORT_FILE: ${{ env.REPORT_FILE }}
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          arch: ${{ env.ANDROID_ARCH }}
          target: ${{ env.ANDROID_TARGET }}
          profile: ${{ env.ANDROID_PROFILE }}
          avd-name: ${{ env.ANDROID_AVD_NAME }}
          force-avd-creation: false
          cores: ${{ env.ANDROID_CORES }}
          ram-size: ${{ env.ANDROID_RAM }}
          heap-size: ${{ env.ANDROID_HEAP }}
          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -no-snapshot-save
            -gpu swiftshader_indirect
            -accel on
          disable-animations: true
          script: bash ${{ env.SCRIPT_PATH }}

      # ── 13. Upload artifacts ─────────────────
      # if: always() = upload even if tests fail
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_number }}
          path: ${{ env.RESULTS_DIR }}
          retention-days: ${{ env.ARTIFACT_RETENTION }}
