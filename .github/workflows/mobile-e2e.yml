name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ── 1. Checkout ─────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. KVM ──────────────────────────────
      # Sans KVM l'émulateur est trop lent → device offline
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 3. Java ─────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Flutter ──────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'   # ← flutter --version sur ta machine
          channel: stable
          cache: true

      # ── 5. Cache AVD ────────────────────────
      - name: Cache Android AVD
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
          key: avd-api33-${{ runner.os }}-x86_64-v1

      # ── 6. Cache Maestro ────────────────────
      - name: Cache Maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-1.40.0

      # ── 7. Installer Maestro ────────────────
      - name: Install Maestro
        run: |
          if ! command -v maestro &> /dev/null; then
            export MAESTRO_VERSION=1.40.0
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── 8. Dependencies ─────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 9. Fix AGP compileSdk 35 ────────────
      - name: Fix Android Gradle Plugin
        run: |
          sed -i \
            "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.3.0/" \
            android/build.gradle
          sed -i \
            "s|gradle-[0-9.]*-bin.zip|gradle-8.4-bin.zip|" \
            android/gradle/wrapper/gradle-wrapper.properties

      # ── 10. Build APK ───────────────────────
      - name: Build APK
        run: flutter build apk --debug

      # ── 11. Vérifier APK ────────────────────
      - name: Check APK
        run: ls -lh build/app/outputs/flutter-apk/app-debug.apk

      # ── 12. Émulateur + Tests ───────────────
      # Le script est dans un fichier .sh — évite les
      # erreurs de parsing multilignes avec /usr/bin/sh
      - name: Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          avd-name: Pixel_6_API33
          force-avd-creation: false
          cores: 2
          ram-size: 4096M
          heap-size: 512M
          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -no-snapshot-save
            -gpu swiftshader_indirect
            -accel on
          disable-animations: true
          script: bash scripts/run_e2e.sh

      # ── 13. Upload artefacts ─────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_number }}
          path: results/
          retention-days: 14
