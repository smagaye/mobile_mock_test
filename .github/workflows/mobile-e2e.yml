name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable

      # ── Cache system image (~1.5 Go) ──────────
      # Évite de le retélécharger à chaque run
      - name: Cache Android system image
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
          key: avd-api33-${{ runner.os }}-x86_64

      # ── Cache Maestro ──────────────────────────
      - name: Cache Maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-1.40.0

      # ── Installer Maestro ──────────────────────
      - name: Install Maestro
        run: |
          if ! command -v maestro &> /dev/null; then
            export MAESTRO_VERSION=1.40.0
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Build APK ─────────────────────────────
      - name: Build APK
        run: flutter build apk --debug

      # ── Démarrer émulateur + lancer les tests ─
      # reactivecircus gère boot + wait + cleanup
      - name: Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          avd-name: Pixel_6_API33
          # Réutilise l'AVD du cache si dispo
          force-avd-creation: false
          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
          disable-animations: true
          script: |
            # Installer l'APK
            adb install build/app/outputs/flutter-apk/app-debug.apk

            # Lancer l'app
            adb shell monkey -p com.example.account_manager 1
            sleep 3

            # Créer le dossier résultats
            mkdir -p results/videos

            # Lancer les tests avec vidéo locale
            ~/.maestro/bin/maestro record --local \
              --output results/videos/full_flow.mp4 \
              maestro/flows/06_full_flow.yaml \
              -e TEST_EMAIL=${{ secrets.TEST_EMAIL }} \
              -e TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}

            # Rapport HTML
            ~/.maestro/bin/maestro test maestro/flows/ \
              -e TEST_EMAIL=${{ secrets.TEST_EMAIL }} \
              -e TEST_PASSWORD=${{ secrets.TEST_PASSWORD }} \
              --format html \
              --output results/rapport.html \
              --test-output-dir results/screenshots

      # ── Upload artefacts (vidéo + screenshots) ─
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results/
          retention-days: 7
