name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # ── 1. Checkout ─────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ─────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Flutter ──────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      # ── 4. Cache AVD ────────────────────────
      - name: Cache Android AVD
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
          key: avd-api33-${{ runner.os }}-x86_64-v1

      # ── 5. Cache Maestro ────────────────────
      - name: Cache Maestro
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-1.40.0

      # ── 6. Installer Maestro ────────────────
      - name: Install Maestro
        run: |
          if ! command -v maestro &> /dev/null; then
            export MAESTRO_VERSION=1.40.0
            curl -Ls "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── 7. Dependencies ─────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 8. Fix AGP compileSdk 35 ────────────
      - name: Fix Android Gradle Plugin version
        run: |
          sed -i \
            "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.3.0/" \
            android/build.gradle
          sed -i \
            "s|gradle-[0-9.]*-bin.zip|gradle-8.4-bin.zip|" \
            android/gradle/wrapper/gradle-wrapper.properties
          echo "AGP fix ✓"

      # ── 9. Build APK ────────────────────────
      - name: Build APK
        run: flutter build apk --debug

      # ── 10. Vérifier l'APK ──────────────────
      - name: Check APK
        run: |
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          echo "APK OK ✓"

      # ── 11. Émulateur + Tests ───────────────
      - name: Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          avd-name: Pixel_6_API33
          force-avd-creation: false
          cores: 2
          ram-size: 4096M
          heap-size: 512M
          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
            -no-snapshot-save
          disable-animations: true

          script: |
            set -e

            echo "════════════════════════════════"
            echo "  Fix device offline"
            echo "════════════════════════════════"

            # Redémarrer le serveur adb proprement
            # Règle le "device offline" dès le départ
            adb kill-server
            sleep 2
            adb start-server
            sleep 3

            echo "════════════════════════════════"
            echo "  Attente device online"
            echo "════════════════════════════════"

            # Attendre que le device passe de offline → online
            # adb wait-for-device seul ne suffit pas (reste offline)
            TIMEOUT=120
            ELAPSED=0
            until adb devices | grep -w "device" | grep -v "List" | grep -v "offline"; do
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Timeout — device toujours offline après ${TIMEOUT}s"
                adb devices
                exit 1
              fi
              echo "  Device offline, attente... (${ELAPSED}s)"
              sleep 3
              ELAPSED=$((ELAPSED + 3))
            done

            echo "Device online ✓"
            adb devices

            echo "════════════════════════════════"
            echo "  Attente boot complet"
            echo "════════════════════════════════"

            # Attendre sys.boot_completed maintenant que le device est online
            TIMEOUT=180
            ELAPSED=0
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; do
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Timeout — boot pas terminé après ${TIMEOUT}s"
                exit 1
              fi
              echo "  Boot en cours... (${ELAPSED}s)"
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            # Attendre la fin des animations de démarrage
            until [ "$(adb shell getprop init.svc.bootanim 2>/dev/null | tr -d '\r')" = "stopped" ]; do
              echo "  Animations en cours..."
              sleep 2
            done

            echo "Boot complet ✓"

            # Désactiver animations — fix screenshot error -1
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            # GPU renderer init
            sleep 10

            echo "════════════════════════════════"
            echo "  Installation APK"
            echo "════════════════════════════════"

            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            echo "APK installé ✓"

            adb shell monkey \
              -p com.example.account_manager \
              --pct-syskeys 0 1
            sleep 5

            echo "════════════════════════════════"
            echo "  Vérification Maestro"
            echo "════════════════════════════════"
            ~/.maestro/bin/maestro hierarchy

            echo "════════════════════════════════"
            echo "  Lancement des tests"
            echo "════════════════════════════════"

            mkdir -p results/videos results/screenshots

            ~/.maestro/bin/maestro record --local \
              --output results/videos/full_flow.mp4 \
              maestro/flows/ \
              -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
              -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}"

            ~/.maestro/bin/maestro test maestro/flows/ \
              -e TEST_EMAIL="${{ secrets.TEST_EMAIL }}" \
              -e TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}" \
              --format html \
              --output results/rapport.html \
              --test-output-dir results/screenshots

            echo "Tests terminés ✓"

      # ── 12. Upload artefacts ─────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_number }}
          path: results/
          retention-days: 14
